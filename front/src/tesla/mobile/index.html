<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikola Tesla</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="steps">
        <div id="step0" class="step">
            <h1 id="title">Titre</h1>
            <p id="desc">description</p>
            <button id="start">Commencer l'expérience</button>
        </div>
    </div>

    <div id="nextContainer">
        <button id="next">Suivant</button>
    </div>


    <!-- Popup -->
    <dialog id="wait">
        <img class="infoIcon" src="../assets/" alt="Attention">
        <h3>Une partie est déjà en cours...</h3>
        <p>Veuillez patienter quelques instants, quelqu'un est déjà en train de jouer !</p>
        <div class="buttons">
            <button class="pushable" id="cancelButton">Retour</button>
            <button class="pushable" id="retryButton">Réessayer</button>
        </div>
    </dialog>

    <script type="module" src="script.js"></script>
</body>

</html>
