<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikola Tesla</title>
    <link rel="stylesheet" href="style.css">
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="steps">
        <div id="step0" class="step transparent-step">
            <div id="div-logo">
                <img src="../assets/logoCortexia.svg" alt="" id="logo">
            </div>
            <p id="info"> Prêt(e) à relever le défi <br> et découvrir nikola Tesla ? </p>
            <button id="start">Commencer</button>
        </div>
    </div>
    
    <div id="nextContainer" style="display: none;">
        <button id="next" class="action-bouton">Suivant</button>
    </div>


    <!-- Popup -->
    <dialog id="wait">
        <!-- <img class="infoIcon" src="../assets/" alt="Attention"> -->
        <h3>Une partie est déjà en cours...</h3>
        <p>Veuillez patienter quelques instants, quelqu'un est déjà en train de jouer !</p>
        <div class="buttons">
            <button class="pushable" id="cancelButton">Retour</button>
            <button class="pushable" id="retryButton">Réessayer</button>
        </div>
    </dialog>

    <script type="module" src="script.js"></script>
</body>

</html>
