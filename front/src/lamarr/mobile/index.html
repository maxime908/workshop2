<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Hedy lamarr</title>
</head>
<body>
    <h1 id="title">Hedy lamarr</h1>
    <p id="desc">description</p>

    <div>
        <button id="start">Commencer l'expérience</button>
        <button id="step1" style="display:none">etape1</button>
        <button id="step2" style="display:none">etape2</button>
        <button id="step3" style="display:none">etape3</button>
    </div>
    <p class="step1"></p>

    <section style="display: none;" id="section-step2">
        <h2>Événements</h2>
        <div id="section-step2-events"></div>
        <h2>Dates</h2>
        <div id="section-step2-dates"></div>
        <button id="submit">Soumettre</button>  
    </section>
    
    <section style="display: none;" id="section-step3">
        <div id="section-step3-questions"></div>
        <div id="section-step3-buttons"></div>
    </section>

    <section style="display: none;" id="section-step4">
        <p id="step4-question"></p>
        <div class="track" id="track">
            <div class="line"></div>
            <div class="dot-fixed start"></div>
            <div class="dot-fixed end"></div>
            <div id="thumb" class="thumb">
                <span id="value-display">0$</span>
            </div>
        </div>
        <button id="validate">Valider</button>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
